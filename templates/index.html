<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Weather Predictor</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
                135deg,
                #0f172a,
                #1e3a8a,
                #38bdf8
            );

            font-family:Arial;
        }

        .card{

            width:400px;

            background:rgba(255,255,255,0.1);

            backdrop-filter:blur(10px);

            border-radius:20px;

            padding:30px;

            text-align:center;

            color:white;

            box-shadow:0 8px 32px rgba(0,0,0,0.3);
        }

        h1{

            margin-bottom:20px;

            font-size:32px;
        }

        .weather-icon{

            font-size:70px;

            margin-bottom:20px;
        }

        input{

            width:100%;

            padding:14px;

            margin:10px 0;

            border:none;

            border-radius:10px;

            outline:none;

            font-size:16px;

            background:rgba(255,255,255,0.2);

            color:white;
        }

        input::placeholder{

            color:#ddd;
        }

        button{

            width:100%;

            padding:14px;

            margin-top:15px;

            border:none;

            border-radius:10px;

            background:#38bdf8;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#0ea5e9;
        }

        .result{

            margin-top:25px;

            padding:20px;

            border-radius:15px;

            background:rgba(255,255,255,0.15);
        }

        .result h2{

            margin-bottom:10px;

            font-size:28px;
        }

        .result p{

            font-size:22px;
        }

    </style>

</head>

<body>

    <div class="card">

        <div class="weather-icon">

            🌦

        </div>

        <h1>Weather Predictor</h1>

        <form method="POST">

            <input
                type="number"
                step="any"
                name="temperature"
                placeholder="Temperature (-30 to 50 °C)"
                min="-30"
                max="50"
                required
            >

            <input
                type="number"
                step="any"
                name="humidity"
                placeholder="Humidity (0-100 %)"
                min="0"
                max="100"
                required
            >

            <input
                type="number"
                step="any"
                name="wind_speed"
                placeholder="Wind Speed (0-100 km/h)"
                min="0"
                max="100"
                required
            >

            <input
                type="number"
                step="any"
                name="pressure"
                placeholder="Pressure (95-105 kPa)"
                min="95"
                max="105"
                required
            >

            <button type="submit">

                Predict Weather

            </button>

        </form>

        {% if prediction %}

        <div class="result">

            <h2>Prediction</h2>

            <p>{{prediction}}</p>

        </div>

        {% endif %}

    </div>

</body>

</html>
